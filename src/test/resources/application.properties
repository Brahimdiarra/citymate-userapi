# Test configuration - H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT for tests - clé 64 chars (512 bits), min 256 bits requis par HMAC-SHA256
jwt.secret=citymate-test-secret-key-for-junit-tests-must-be-at-least-256-bits!!
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# Logging
logging.level.root=WARN
logging.level.com.citymate.userapi=INFO


